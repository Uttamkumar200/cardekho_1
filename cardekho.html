<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarDekho Clone 2026</title>
<style>
:root {
    --bg:#f5f5f5;
    --text:#222;
    --card:#fff;
    --primary:#007bff;
    --secondary:#555;
}
body.dark {
    --bg:#121212;
    --text:#eee;
    --card:#1e1e1e;
    --primary:#1e90ff;
    --secondary:#bbb;
}
body {margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);scroll-behavior:smooth;}
header {background:#222;color:white;padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
nav a {color:white;margin:0 15px;text-decoration:none;font-weight:bold;}
nav button {padding:5px 10px;cursor:pointer;}
section {padding:80px 20px;max-width:1200px;margin:auto;}
h1,h2{text-align:center;margin-bottom:20px;}
p{text-align:center;color:var(--secondary);}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:20px;}
.card {background:var(--card);border-radius:10px;overflow:hidden;position:relative;box-shadow:0 0 10px rgba(0,0,0,0.1);transition:transform 0.2s;}
.card:hover{transform:translateY(-5px);}
.card img{width:100%;height:150px;object-fit:cover;}
.card-content{padding:10px;text-align:center;}
.card-content h3{margin:10px 0;}
.card-content p{margin:5px 0;font-weight:bold;}
.card-content button{background:var(--primary);color:white;border:none;padding:5px 10px;cursor:pointer;border-radius:5px;}
.card-content button:hover{background:darkblue;}
.favorite{position:absolute;top:8px;right:8px;font-size:20px;cursor:pointer;color:red;}
.sort-bar{text-align:center;margin-bottom:20px;}
.sort-bar select{padding:5px 10px;}
form{max-width:600px;margin:auto;display:flex;flex-direction:column;gap:10px;}
input,textarea{padding:10px;border-radius:5px;border:1px solid #ccc;}
textarea{resize:vertical;}
footer{background:#222;color:white;text-align:center;padding:20px;}
#backToTop{position:fixed;bottom:30px;right:30px;padding:10px 15px;background:var(--primary);color:white;border:none;border-radius:50%;font-size:20px;cursor:pointer;display:none;}
@media(max-width:768px){header{flex-direction:column;}nav{margin-top:10px;}}
</style>
</head>
<body>

<header>
    <div><h1>🚗 CarDekho Clone 2026</h1></div>
    <div>
        <nav>
            <a href="#home">Home</a>
            <a href="#popular">Popular Cars</a>
            <a href="#brands">Brands</a>
            <a href="#newarrivals">New Arrivals</a>
            <a href="#contact">Contact</a>
        </nav>
    </div>
    <button onclick="toggleDark()">🌙 Dark Mode</button>
</header>

<section id="home">
    <h1>Welcome to CarDekho Clone</h1>
    <p>Find your perfect car! Browse, filter, and favorite your favorite cars.</p>
</section>

<section id="popular">
    <h2>Popular Cars</h2>
    <div class="sort-bar">
        Sort by:
        <select id="sortSelect" onchange="sortCars()">
            <option value="name">Name</option>
            <option value="priceAsc">Price: Low to High</option>
            <option value="priceDesc">Price: High to Low</option>
        </select>
    </div>
    <input type="text" id="search" placeholder="Search cars..." style="width:100%;padding:10px;margin-bottom:20px;" onkeyup="searchCars()">
    <div class="grid" id="carGrid"></div>
</section>

<section id="brands">
    <h2>Brands</h2>
    <div class="grid" id="brandGrid"></div>
</section>

<section id="newarrivals">
    <h2>New Arrivals</h2>
    <div class="grid" id="newGrid"></div>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <form id="contactForm" onsubmit="return submitForm()">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    <p>© 2026 CarDekho Clone</p>
</footer>

<button id="backToTop" onclick="scrollTop()">↑</button>

<script>
// Dark mode
function toggleDark(){document.body.classList.toggle('dark');}

// Car data with real-ish images
const cars=[
{id:1,name:"Maruti Swift",price:550000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90mau021a021001.png"},
{id:2,name:"Hyundai Creta",price:1050000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90hye022a021001.png"},
{id:3,name:"Honda City",price:1200000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90hce022a021001.png"},
{id:4,name:"Tata Nexon",price:850000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90txe022a021001.png"},
{id:5,name:"Mahindra Thar",price:1400000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90mha022a021001.png"},
{id:6,name:"Kia Seltos",price:1150000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90kse022a021001.png"},
{id:7,name:"Toyota Fortuner",price:3500000,img:"https://www.cstatic-images.com/car-pictures/xl/usc90tfo022a021001.png"}
];
let favorites=[];

// Display Cars
let filteredCars=cars;
function displayCars(list){
    const grid=document.getElementById("carGrid");
    grid.innerHTML="";
    list.forEach(c=>{
        const favClass=favorites.includes(c.id)?"❤️":"🤍";
        grid.innerHTML+=`
        <div class="card">
            <span class="favorite" onclick="toggleFavorite(${c.id})">${favClass}</span>
            <img src="${c.img}">
            <div class="card-content">
                <h3>${c.name}</h3>
                <p>₹${c.price.toLocaleString()}</p>
                <button onclick="alert('Contact dealer for ${c.name}')">View Details</button>
            </div>
        </div>`;
    });
}

// Favorite toggle
function toggleFavorite(id){
    if(favorites.includes(id)){favorites=favorites.filter(f=>f!==id);}
    else{favorites.push(id);}
    displayCars(filteredCars);
}

// Search
function searchCars(){
    const val=document.getElementById("search").value.toLowerCase();
    filteredCars=cars.filter(c=>c.name.toLowerCase().includes(val));
    displayCars(filteredCars);
}

// Sort
function sortCars(){
    const val=document.getElementById("sortSelect").value;
    if(val==="name"){filteredCars.sort((a,b)=>a.name.localeCompare(b.name));}
    else if(val==="priceAsc"){filteredCars.sort((a,b)=>a.price-b.price);}
    else if(val==="priceDesc"){filteredCars.sort((a,b)=>b.price-a.price);}
    displayCars(filteredCars);
}

// Brands
const brands=[
{name:"Maruti",img:"https://www.carlogos.org/car-logos/maruti-logo.png"},
{name:"Hyundai",img:"https://www.carlogos.org/car-logos/hyundai-logo.png"},
{name:"Honda",img:"https://www.carlogos.org/car-logos/honda-logo.png"},
{name:"Tata",img:"https://www.carlogos.org/car-logos/tata-logo.png"},
{name:"Mahindra",img:"https://www.carlogos.org/car-logos/mahindra-logo.png"},
{name:"Kia",img:"https://www.carlogos.org/car-logos/kia-logo.png"},
{name:"Toyota",img:"https://www.carlogos.org/car-logos/toyota-logo.png"}
];
function displayBrands(){
    const grid=document.getElementById("brandGrid");
    grid.innerHTML="";
    brands.forEach(b=>{grid.innerHTML+=`
        <div class="card">
            <img src="${b.img}" style="height:100px;object-fit:contain;">
            <div class="card-content"><h3>${b.name}</h3></div>
        </div>`;});
}
displayBrands();

// New arrivals (last 3 cars)
function displayNewArrivals(){
    const grid=document.getElementById("newGrid");
    grid.innerHTML="";
    cars.slice(-3).forEach(c=>{grid.innerHTML+=`
        <div class="card">
            <img src="${c.img}">
            <div class="card-content">
                <h3>${c.name}</h3>
                <p>₹${c.price.toLocaleString()}</p>
            </div>
        </div>`;});
}
displayNewArrivals();

// Initial display
displayCars(cars);

// Contact Form
function submitForm(){
    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;
    const message=document.getElementById("message").value;
    if(name&&email&&message){
        alert(`Thank you, ${name}! Your message has been sent.`);
        document.getElementById("contactForm").reset();
        return false;
    }
}

// Back to top
window.onscroll=function(){document.getElementById("backToTop").style.display=(window.scrollY>300)?"block":"none";};
function scrollTop(){window.scrollTo({top:0,behavior:"smooth"});}
</script>

</body>
</html>
